name: Doc Sync - DB Changes Table on PR Merge

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  sync-db-docs:
    name: Sync DB Changes to Confluence
    runs-on: ubuntu-latest
    # Only run when the PR is actually merged (not just closed)
    if: github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR and Jira info
        id: pr_info
        run: |
          # PR details
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          AUTHOR_NAME="${{ github.event.pull_request.user.login }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR_NAME" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          # Extract Jira Story ID from PR title or branch name
          # Looks for pattern like DEMO-123, ABC-456
          JIRA_ID=$(echo "$PR_TITLE $BRANCH" | grep -oP '[A-Z]+-[0-9]+' | head -1 || echo "NO-JIRA-ID")
          echo "jira_id=$JIRA_ID" >> $GITHUB_OUTPUT

          echo "repository=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Extract DB-related changed files
        id: db_files
        run: |
          # Get all files changed in this PR
          git fetch origin main
          CHANGED_FILES=$(git diff --name-only origin/main...${{ github.event.pull_request.head.sha }})

          echo "All changed files:"
          echo "$CHANGED_FILES"

          # Filter for DB-related files: .sql, migration files, db scripts
          DB_FILES=$(echo "$CHANGED_FILES" | grep -iE '\.(sql)$|[Dd]atabase|[Mm]igration|[Ss]cripts?/|db_|_db\.' || echo "")

          if [ -z "$DB_FILES" ]; then
            DB_FILES="No DB scripts changed"
            HAS_DB=false
          else
            HAS_DB=true
          fi

          # Format the file list
          DB_FILES_FORMATTED=$(echo "$DB_FILES" | tr '\n' ' | ' | sed 's/ | $//')
          echo "db_files=$DB_FILES_FORMATTED" >> $GITHUB_OUTPUT
          echo "has_db=$HAS_DB" >> $GITHUB_OUTPUT

          # Also get full diff of DB files for context
          if [ "$HAS_DB" = "true" ]; then
            DB_DIFF=$(git diff origin/main...${{ github.event.pull_request.head.sha }} -- $(echo "$DB_FILES" | tr '\n' ' ') 2>/dev/null | head -200)
            DB_DIFF_B64=$(echo "$DB_DIFF" | base64 -w 0)
          else
            DB_DIFF_B64=$(echo "No DB changes" | base64 -w 0)
          fi
          echo "db_diff_base64=$DB_DIFF_B64" >> $GITHUB_OUTPUT

      - name: Send to n8n webhook
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: ${{ secrets.N8N_AUTH_TOKEN }}" \
            -d "{
              \"jira_id\": \"${{ steps.pr_info.outputs.jira_id }}\",
              \"author\": \"${{ steps.pr_info.outputs.author }}\",
              \"reviewer\": \"Morgan Housel\",
              \"pr_number\": \"${{ steps.pr_info.outputs.pr_number }}\",
              \"pr_title\": \"${{ steps.pr_info.outputs.pr_title }}\",
              \"pr_url\": \"${{ steps.pr_info.outputs.pr_url }}\",
              \"branch\": \"${{ steps.pr_info.outputs.branch }}\",
              \"db_files\": \"${{ steps.db_files.outputs.db_files }}\",
              \"has_db_changes\": \"${{ steps.db_files.outputs.has_db }}\",
              \"db_diff_base64\": \"${{ steps.db_files.outputs.db_diff_base64 }}\",
              \"repository\": \"${{ steps.pr_info.outputs.repository }}\",
              \"page_id\": \"${{ secrets.CONFLUENCE_PAGE_ID }}\",
              \"timestamp\": \"${{ steps.pr_info.outputs.timestamp }}\"
            }"
