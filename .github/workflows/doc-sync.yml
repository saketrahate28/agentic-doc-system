name: Doc Sync - Update Confluence on Push

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || true

  sync-docs:
    name: Sync Documentation to Confluence
    runs-on: ubuntu-latest
    needs: test
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit for diff

      - name: Extract commit info
        id: commit_info
        run: |
          # Get the commit message
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT

          # Get the author
          AUTHOR=$(git log -1 --pretty=format:"%an")
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT

          # Get the repo name
          echo "repository=${{ github.repository }}" >> $GITHUB_OUTPUT

          # Extract page ID from [DocUpdate: XXXXX] tag
          PAGE_ID=$(echo "$COMMIT_MSG" | grep -oP '\[DocUpdate:\s*\K[0-9]+' || echo "${{ secrets.CONFLUENCE_PAGE_ID }}")
          echo "page_id=$PAGE_ID" >> $GITHUB_OUTPUT

          # Check if DocUpdate tag exists
          if echo "$COMMIT_MSG" | grep -q '\[DocUpdate:'; then
            echo "has_doc_tag=true" >> $GITHUB_OUTPUT
          else
            echo "has_doc_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate git diff
        id: git_diff
        run: |
          # Get diff from previous commit, Base64 encode to avoid JSON issues
          DIFF=$(git diff HEAD~1 HEAD -- '*.py' '*.js' '*.ts' '*.md' '*.yml' '*.yaml' | head -500)
          DIFF_B64=$(echo "$DIFF" | base64 -w 0)
          echo "diff_base64=$DIFF_B64" >> $GITHUB_OUTPUT

      - name: Send to n8n webhook
        if: steps.commit_info.outputs.has_doc_tag == 'true'
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: ${{ secrets.N8N_AUTH_TOKEN }}" \
            -d '{
              "repository": "${{ steps.commit_info.outputs.repository }}",
              "commit_message": "${{ steps.commit_info.outputs.commit_message }}",
              "author": "${{ steps.commit_info.outputs.author }}",
              "page_id": "${{ steps.commit_info.outputs.page_id }}",
              "diff_base64": "${{ steps.git_diff.outputs.diff_base64 }}",
              "timestamp": "${{ github.event.head_commit.timestamp }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Skip - No DocUpdate tag
        if: steps.commit_info.outputs.has_doc_tag != 'true'
        run: echo "⏭️ No [DocUpdate] tag found in commit message. Skipping doc sync."
