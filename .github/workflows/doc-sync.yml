name: Doc Sync - AI Summary on PR Merge

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  ai-doc-sync:
    name: AI Documentation Sync to Confluence
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract PR info
        id: pr_info
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR="${{ github.event.pull_request.user.login }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.merge_commit_sha }}"

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "base_sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          echo "repository=${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

          # Extract Jira story ID from PR title or branch (e.g. DEMO-1, SCRUM-42)
          JIRA_ID=$(echo "$PR_TITLE $BRANCH" | grep -oP '[A-Z]+-[0-9]+' | head -1 || echo "NO-ID")
          echo "jira_id=$JIRA_ID" >> $GITHUB_OUTPUT

      - name: Get ALL changed files and full diff
        id: diff_info
        run: |
          BASE="${{ steps.pr_info.outputs.base_sha }}"
          HEAD="${{ steps.pr_info.outputs.head_sha }}"

          # Get list of ALL changed files
          ALL_FILES=$(git diff --name-only $BASE $HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$ALL_FILES"

          # Format file list (pipe separated)
          FILES_LIST=$(echo "$ALL_FILES" | tr '\n' ' | ' | sed 's/ | $//')
          echo "files_list=$FILES_LIST" >> $GITHUB_OUTPUT

          # Get the full diff (all files, limited to 300 lines to avoid payload limits)
          FULL_DIFF=$(git diff $BASE $HEAD 2>/dev/null | head -300)
          if [ -z "$FULL_DIFF" ]; then
            FULL_DIFF=$(git diff HEAD~1 HEAD | head -300)
          fi

          # Base64 encode the full diff to avoid JSON escaping issues
          DIFF_B64=$(echo "$FULL_DIFF" | base64 -w 0)
          echo "diff_base64=$DIFF_B64" >> $GITHUB_OUTPUT

          # Count files changed
          FILE_COUNT=$(echo "$ALL_FILES" | wc -l)
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT

      - name: Send to n8n for AI summarization
        run: |
          curl -f -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: ${{ secrets.N8N_AUTH_TOKEN }}" \
            --connect-timeout 30 \
            --max-time 60 \
            -d "{
              \"jira_id\": \"${{ steps.pr_info.outputs.jira_id }}\",
              \"author\": \"${{ steps.pr_info.outputs.author }}\",
              \"reviewer\": \"Morgan Housel\",
              \"pr_number\": \"${{ steps.pr_info.outputs.pr_number }}\",
              \"pr_title\": \"${{ steps.pr_info.outputs.pr_title }}\",
              \"pr_url\": \"${{ steps.pr_info.outputs.pr_url }}\",
              \"branch\": \"${{ steps.pr_info.outputs.branch }}\",
              \"files_changed\": \"${{ steps.diff_info.outputs.files_list }}\",
              \"file_count\": \"${{ steps.diff_info.outputs.file_count }}\",
              \"diff_base64\": \"${{ steps.diff_info.outputs.diff_base64 }}\",
              \"repository\": \"${{ steps.pr_info.outputs.repository }}\",
              \"page_id\": \"${{ secrets.CONFLUENCE_PAGE_ID }}\",
              \"timestamp\": \"${{ steps.pr_info.outputs.timestamp }}\"
            }"
          echo "Webhook sent successfully"
